<!DOCTYPE html>
<html>
<head>
    <title>生成图标</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .icon {
            width: 16px;
            height: 16px;
            background-color: #4CAF50;

            align-items: center;
            justify-content: center;

            font-weight: bold;
            font-family: Arial, sans-serif;

</html>
